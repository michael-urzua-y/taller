<header class="site-header">
  <div class="container nav">
    <a class="brand" href="{{ url_for('site.home') }}" data-home-link>
      <img class="brand-logo" src="{{ url_for('static', filename='img/logo-hyh.webp') }}" alt="{{ site_name }}" />
      <span>
        <strong>{{ site_name }}</strong>
        <small>{{ content.site_copy.brand_subtitle }}</small>
      </span>
    </a>

    <nav class="nav-links" aria-label="Principal">
      {% for item in navigation %}
        <a
          href="{{ url_for(item.endpoint) }}"
          {% if item.endpoint == "site.home" %}data-home-link{% endif %}
          {% if meta.page_key == item.endpoint.split('.')[-1] %}aria-current="page"{% endif %}
        >
          {{ item.label }}
        </a>
      {% endfor %}
    </nav>

    <a
      class="button button-primary nav-cta"
      href="https://wa.me/{{ content.contact.whatsapp_number }}?text={{ content.site_copy.nav_cta_message | urlencode }}"
      target="_blank"
      rel="noreferrer"
    >
      {{ content.site_copy.nav_cta_label }}
    </a>
  </div>
</header>
