<footer class="site-footer">
  <div class="container footer-content">
    <div class="footer-brand-block">
      <a class="footer-brand" href="{{ url_for('site.home') }}">
        <img class="footer-brand-logo" src="{{ url_for('static', filename='img/logo-hyh.webp') }}" alt="{{ site_name }}" />
        <span class="footer-brand-copy">
          <strong>{{ site_name }}</strong>
          <small>{{ content.site_copy.brand_subtitle }}</small>
        </span>
      </a>
      <p class="footer-tagline">{{ content.site_copy.footer_tagline }}</p>
    </div>

    <div class="footer-meta">
      <p>{{ content.site_copy.footer_credit }}</p>
    </div>
  </div>
</footer>
