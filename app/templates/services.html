{% extends "base.html" %}
{% from "partials/cards.html" import service_cards %}

{% block body %}
  <main class="page-main">
    <section class="page-hero page-hero-services">
      <div class="container services-hero-simple">
        <span class="eyebrow">{{ content.services_page.eyebrow }}</span>
        <h1>{{ content.services_page.title }}</h1>
        <p>{{ content.services_page.description }}</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        {{ service_cards(content.services, content.site_copy) }}
      </div>
    </section>
  </main>
{% endblock %}
