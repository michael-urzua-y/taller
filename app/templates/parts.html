{% extends "base.html" %}

{% block body %}

    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">{{ content.parts_page.eyebrow }}</span>
        <h1>{{ content.parts_page.title }}</h1>
        <p>{{ content.parts_page.description }}</p>

    <section class="section section-alt">
      <div class="container">
        {{ part_cards(content.parts, content.contact.whatsapp_number, content.site_copy) }}
      </div>
    </section>
  </main>
{% endblock %}
